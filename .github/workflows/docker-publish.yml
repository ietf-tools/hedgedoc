name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      baseVersion:
        required: true
        description: Base Version
        type: string
      setLatest:
        required: true
        default: false
        description: Set as Latest
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Base Versions
        run: |
          sed -i -e 's/BASE_VERSION/${{ inputs.baseVersion }}/g' notes.Dockerfile
          sed -i -e 's/BASE_VERSION/${{ inputs.baseVersion }}/g' private.Dockerfile

      - name: Build and push Private Notes Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: private.Dockerfile
          provenance: false
          push: true
          sbom: false
          tags: |
            ghcr.io/ietf-tools/hedgedoc:${{ inputs.baseVersion }}
            ${{ case(inputs.setLatest, 'ghcr.io/ietf-tools/hedgedoc:latest', '') }}

      - name: Build and push IETF Notes Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: notes.Dockerfile
          provenance: false
          push: true
          sbom: false
          tags: |
            ghcr.io/ietf-tools/hedgedoc-notes:${{ inputs.baseVersion }}
            ${{ case(inputs.setLatest, 'ghcr.io/ietf-tools/hedgedoc-notes:latest', '') }}
